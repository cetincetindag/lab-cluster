apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      volumes:
        - name: audiobookshelf-data
          persistentVolumeClaim:
            claimName: audiobookshelf-data-pvc
      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:latest
          envFrom:
            - configMap:
                name: audiobookshelf-configmap
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - mountPath: "/etc/audiobookshelf/data"
              name: audiobookshelf-data
